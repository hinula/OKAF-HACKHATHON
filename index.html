<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trafik Lambası Kontrol Paneli</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Segoe UI,Tahoma;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{display:flex;gap:30px;flex-wrap:wrap}

.traffic-light{
    background:#1a252f;
    padding:30px;
    border-radius:30px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.light{
    width:120px;height:120px;
    border-radius:50%;
    opacity:.3;
    transition:.3s;
}

.light.active{
    opacity:1;
    box-shadow:0 0 50px currentColor;
}

.red{background:#ff2d2d}
.yellow{background:#ffd000}
.green{background:#00ff6a}

.control-panel{
    background:white;
    padding:30px;
    border-radius:20px;
    min-width:320px;
}

.timer{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin:10px 0;
}

.active-label{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.status.running{color:green}
.status.stopped{color:red}

button{
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
.btn-start{background:#00c853;color:white}
.btn-stop{background:#ff5252;color:white}
.btn-reset{background:#ffa726;color:white;width:100%}
</style>
</head>

<body>

<div class="container">

<div class="traffic-light">
    <div class="light red" id="redLight"></div>
    <div class="light yellow" id="yellowLight"></div>
    <div class="light green" id="greenLight"></div>
</div>

<div class="control-panel">

<h2 style="text-align:center">🚦 Kontrol Paneli</h2>

<div class="active-label" id="activeLabel">
Aktif Işık: —
</div>

<div class="timer" id="timer">--</div>

<button class="btn-start" onclick="start()">Başlat</button>
<button class="btn-stop" onclick="stop()">Durdur</button>
<button class="btn-reset" onclick="reset()">Sıfırla</button>

<div class="status stopped" id="status">Duruyor</div>

</div>
</div>

<script>
let order=["red","yellow","green"]
let durations={red:5,yellow:2,green:5}
let index=0
let timeLeft=0
let interval=null

function setActive(color){
    ["red","yellow","green"].forEach(c=>{
        document.getElementById(c+"Light").classList.remove("active")
    })
    document.getElementById(color+"Light").classList.add("active")

    const label=document.getElementById("activeLabel")
    label.innerText="Aktif Işık: "+color.toUpperCase()

    if(color==="red") label.style.color="#ff2d2d"
    if(color==="yellow") label.style.color="#c9a600"
    if(color==="green") label.style.color="#00b248"
}

function tick(){
    document.getElementById("timer").innerText=timeLeft+"s"
    if(timeLeft<=0){
        index=(index+1)%3
        startCycle()
    }
    timeLeft--
}

function startCycle(){
    let color=order[index]
    setActive(color)
    timeLeft=durations[color]
}

function start(){
    document.getElementById("status").innerText="Çalışıyor"
    document.getElementById("status").className="status running"
    index=0
    startCycle()
    interval=setInterval(tick,1000)
}

function stop(){
    clearInterval(interval)
    document.getElementById("status").innerText="Duruyor"
    document.getElementById("status").className="status stopped"
}

function reset(){
    stop()
    document.getElementById("timer").innerText="--"
    document.getElementById("activeLabel").innerText="Aktif Işık: —"
    ["red","yellow","green"].forEach(c=>{
        document.getElementById(c+"Light").classList.remove("active")
    })
}
</script>

</body>
</html>
