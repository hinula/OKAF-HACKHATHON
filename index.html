<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trafik Lambası Kontrol Paneli</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}
.container{display:flex;gap:30px;flex-wrap:wrap}
.traffic-light{
    background:#1a252f;
    padding:30px;
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    display:flex;
    flex-direction:column;
    gap:20px
}
.light{
    width:120px;height:120px;border-radius:50%;
    background:#333;
    transition:.3s;
}
.light.active{box-shadow:0 0 40px currentColor}
.red{background:#cc0000}
.yellow{background:#cc8800}
.green{background:#00cc00}

.control-panel{
    background:white;
    padding:30px;
    border-radius:20px;
    min-width:320px
}
.timer{text-align:center;font-size:32px;font-weight:bold;color:#667eea;margin:15px 0}
button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.btn-start{background:#00c853;color:white}
.btn-stop{background:#ff5252;color:white}
.btn-reset{background:#ffa726;color:white;width:100%;margin-top:10px}
.status{text-align:center;margin-top:15px;font-weight:bold}
.status.running{color:green}
.status.stopped{color:red}
</style>
</head>

<body>

<div class="container">

<div class="traffic-light">
    <div class="light red" id="redLight"></div>
    <div class="light yellow" id="yellowLight"></div>
    <div class="light green" id="greenLight"></div>
</div>

<div class="control-panel">
<h2>🚦 Kontrol Paneli</h2>

<label>Kırmızı Süre</label>
<input type="range" min="1" max="20" value="5" oninput="setValue('red',this.value)">
<p id="redValue">5 saniye</p>

<label>Sarı Süre</label>
<input type="range" min="1" max="10" value="2" oninput="setValue('yellow',this.value)">
<p id="yellowValue">2 saniye</p>

<label>Yeşil Süre</label>
<input type="range" min="1" max="20" value="5" oninput="setValue('green',this.value)">
<p id="greenValue">5 saniye</p>

<div class="timer" id="timer">--</div>

<button class="btn-start" onclick="start()">Başlat</button>
<button class="btn-stop" onclick="stop()">Durdur</button>
<button class="btn-reset" onclick="reset()">Sıfırla</button>

<div class="status stopped" id="status">Duruyor</div>
</div>

</div>

<script>
let durations={red:5,yellow:2,green:5}
let order=["red","yellow","green"]
let index=0
let timer=null
let timeLeft=0

function setValue(color,val){
    durations[color]=parseInt(val)
    document.getElementById(color+"Value").innerText=val+" saniye"
}

function lightOn(color){
    ["red","yellow","green"].forEach(c=>{
        document.getElementById(c+"Light").classList.remove("active")
    })
    document.getElementById(color+"Light").classList.add("active")
}

function tick(){
    document.getElementById("timer").innerText=timeLeft+"s"
    if(timeLeft<=0){
        index=(index+1)%3
        startCycle()
    }
    timeLeft--
}

function startCycle(){
    let color=order[index]
    lightOn(color)
    timeLeft=durations[color]
}

function start(){
    document.getElementById("status").innerText="Çalışıyor"
    document.getElementById("status").className="status running"
    index=0
    startCycle()
    timer=setInterval(tick,1000)
}

function stop(){
    clearInterval(timer)
    document.getElementById("status").innerText="Duruyor"
    document.getElementById("status").className="status stopped"
}

function reset(){
    stop()
    document.getElementById("timer").innerText="--"
    ["red","yellow","green"].forEach(c=>{
        document.getElementById(c+"Light").classList.remove("active")
    })
}
</script>

</body>
</html>
